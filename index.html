<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sanu!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #ff69b4;
        }
        .gallery {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .gallery img {
            margin: 10px;
            width: 200px;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        @keyframes confetti {
            0% { transform: translateY(0); }
            100% { transform: translateY(100%); opacity: 0; }
        }
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #ff0;
            animation: confetti 2s linear infinite;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <h1>Happy Birthday Sanu!</h1>
    <p>Wishing you a day filled with love and joy!</p>
    <div class="gallery">
        <img src="image1.jpg" alt="Birthday Image 1">
        <img src="image2.jpg" alt="Birthday Image 2">
        <img src="image3.jpg" alt="Birthday Image 3">
    </div>
    <h2>Special Messages:</h2>
    <p>"You are loved more than you know!"</p>
    <p>"May your dreams come true!"</p>
    <script>
        // Confetti effect
        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            confetti.style.left = Math.random() * 100 + '%';
            document.body.appendChild(confetti);
            setTimeout(() => {
                confetti.remove();
            }, 2000);
        }
        setInterval(createConfetti, 100);
    </script>
</body>
</html>
